<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signature Decoder v2</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #e5e5e5;
      --dim: #555;
      --border: #333;
      --accent: #fff; /* High contrast white */
      --signal: #0f0; /* Terminal green */
      --err: #f00;
      --pad: 24px;
    }

    * { box-sizing: border-box; outline: none; }
    
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.4;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--pad);
    }

    /* ─── Shell (dual-column wrapper) ─── */
    .shell {
      display: flex;
      gap: 0;
      width: 100%;
      align-items: stretch;
    }

    /* ─── Grid Layout ─── */
    .interface {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* ─── Samples Panel ─── */
    .samples {
      flex: 0 0 340px;
      border: 1px solid var(--border);
      border-left: none;
      display: flex;
      flex-direction: column;
    }

    .samples-header {
      padding: var(--pad);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* Match interface header height approximately */
      flex: 0 0 auto;
    }

    .samples-list {
      display: flex;
      flex-direction: column;
      flex: 1; /* Take remaining height */
    }

    .sample-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 var(--pad); /* Remove vertical padding, handle via flex alignment */
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-family: inherit;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
      text-transform: none;
      flex: 1; /* Distribute height evenly */
      min-height: 48px; /* Minimum touch target */
    }
    .sample-row:last-child { border-bottom: none; }
    .sample-row:hover { background: #111; }
    .sample-row:active { background: #1a1a1a; transform: translateY(1px); }

    .sample-row::before,
    .sample-row::after { content: none; }

    .sample-label {
      flex: 1;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 11px;
    }

    .sample-meta {
      color: var(--dim);
      font-size: 10px;
      flex-shrink: 0;
    }

    .sample-expect {
      font-size: 10px;
      padding: 1px 5px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sample-expect.allow { color: var(--signal); border: 1px solid var(--signal); }
    .sample-expect.block { color: var(--err); border: 1px solid var(--err); }

    .sample-arrow {
      color: var(--dim);
      font-size: 14px;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .sample-row:hover .sample-arrow { color: var(--accent); }

    /* ─── Page Wrapper ─── */
    .page {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
    }

    /* ─── Wallet Bar ─── */
    .wallet-bar {
      border: 1px solid var(--border);
      border-bottom: none; /* Merge with shell top border */
      padding: 12px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 12px;
      box-sizing: border-box; /* Ensure padding is included in width */
    }

    .wallet-status {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .wallet-dot {
      width: 6px; height: 6px;
      flex-shrink: 0;
      background: var(--dim);
    }
    .wallet-dot.connected {
      background: var(--signal);
      box-shadow: 0 0 6px var(--signal);
    }

    .wallet-chain {
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 10px;
      flex-shrink: 0;
    }

    .wallet-addr {
      color: var(--fg);
      letter-spacing: 0.02em;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wallet-actions {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      margin-right: 10px; /* Shift button left to prevent border clipping */
    }

    .wallet-btn {
      background: transparent;
      color: var(--dim); /* Default gray */
      border: 1px solid var(--border); /* Default gray border */
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    
    /* Override global button:last-child rule */
    .wallet-actions .wallet-btn:last-child {
      border-right: 1px solid;
    }

    .wallet-btn:hover {
      color: var(--fg);
      border-color: var(--fg);
      background: #111;
    }
    .wallet-btn:active { transform: translateY(1px); }
    
    /* Connect Button (Unconnected state) - Gray by default, Green on hover */
    .wallet-btn.connect-btn {
      color: var(--dim);
      border-color: var(--dim);
    }
    .wallet-btn.connect-btn:hover {
      color: var(--signal);
      border-color: var(--signal);
      background: rgba(0, 255, 0, 0.05);
    }

    /* Connected Button - Subtle background */
    .wallet-btn.connected-btn {
      background: rgba(0, 255, 0, 0.1);
      color: var(--signal);
      border-color: var(--signal);
      font-weight: normal;
    }
    .wallet-btn.connected-btn:hover {
      background: rgba(255, 0, 0, 0.1); /* Subtle red on hover */
      border-color: var(--err);
      color: var(--err);
    }
    .wallet-btn.connected-btn:hover::before {
      content: "DISCONNECT";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 0, 0, 0.9); /* Opaque red for text contrast */
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* Connected State Indicator */
    .wallet-status.connected .wallet-addr {
        color: var(--signal);
    }

    /* ─── Typography & Elements ─── */
    h1, h2, h3 { margin: 0; font-weight: 400; font-size: inherit; text-transform: uppercase; letter-spacing: 0.05em; }
    a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    a:hover { background: var(--fg); color: var(--bg); text-decoration: none; }

    /* ─── Sections ─── */
    .row {
      border-bottom: 1px solid var(--border);
      padding: var(--pad);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .row:last-child { border-bottom: none; }
    
    .col-header { color: var(--dim); margin-bottom: 12px; display: block; }

    /* ─── Header ─── */
    header.row { align-items: center; }
    .badge { 
      background: var(--fg); 
      color: var(--bg); 
      padding: 2px 6px; 
      font-size: 11px; 
    }

    /* ─── Status ─── */
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      background: var(--dim);
      border-radius: 0; /* Square dots for brutalism */
    }
    .dot.active { background: var(--signal); box-shadow: 0 0 8px var(--signal); }
    .dot.error { background: var(--err); box-shadow: 0 0 8px var(--err); }

    /* ─── Controls ─── */
    .controls { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
    
    button {
      background: transparent;
      color: var(--fg);
      border: none;
      border-right: 1px solid var(--border);
      padding: 20px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      text-align: left;
      font-size: 12px;
      transition: all 0.1s;
      position: relative;
    }
    button:last-child { border-right: none; }
    button:hover:not(:disabled) { background: #111; color: var(--accent); }
    button:active:not(:disabled) { background: #222; transform: translateY(1px); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    
    button::before { content: "[ "; color: var(--dim); opacity: 0; transition: opacity 0.2s; }
    button::after { content: " ]"; color: var(--dim); opacity: 0; transition: opacity 0.2s; }
    button:hover::before, button:hover::after { opacity: 1; }

    /* ─── Log ─── */
    .log-container {
      height: 200px;
      overflow-y: auto;
      padding: var(--pad);
      background: #080808;
      font-size: 12px;
      
      /* Firefox: Default transparent, show on hover */
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
      transition: scrollbar-color 0.2s;
    }
    .log-container:hover {
      scrollbar-color: var(--dim) transparent;
    }

    /* Webkit (Chrome/Edge/Safari) */
    .log-container::-webkit-scrollbar {
      width: 6px; /* Thinner for floating look */
      height: 6px;
      background: transparent;
    }
    .log-container::-webkit-scrollbar-track {
      background: transparent; /* No track background */
      border: none;
    }
    .log-container::-webkit-scrollbar-thumb {
      background-color: transparent;
      border: none;
    }
    
    /* Show thumb on container hover */
    .log-container:hover::-webkit-scrollbar-thumb {
      background-color: var(--dim);
    }
    
    /* Active thumb state */
    .log-container::-webkit-scrollbar-thumb:hover {
      background-color: var(--fg);
    }
    .log-entry { margin-bottom: 4px; display: block; opacity: 0.7; }
    .log-entry.new { opacity: 1; color: var(--accent); }
    .log-entry.err { color: var(--err); }
    .ts { color: var(--dim); margin-right: 8px; user-select: none; }

    /* ─── Footer / Info ─── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
    .info-item {
      padding: var(--pad);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .info-item:nth-child(2n) { border-right: none; }
    .info-item:nth-last-child(-n+2) { border-bottom: none; }

    /* ─── Utilities ─── */
    .mono-box {
      border: 1px solid var(--border);
      padding: 8px 12px;
      margin-top: 8px;
      display: inline-block;
      color: var(--dim);
    }
    .hidden { display: none; }

    @media (max-width: 1100px) {
      .page { max-width: 680px; }
      .shell { flex-direction: column; }
      .samples {
        flex: none;
        width: 100%;
        border-left: 1px solid var(--border);
        border-top: none;
      }
    }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      .info-item { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div class="page">
  <!-- Wallet Connect Bar -->
  <div class="wallet-bar" id="walletBar">
    <div class="wallet-status">
      <div class="wallet-dot" id="walletDot"></div>
      <span class="wallet-chain" id="walletChain">NOT CONNECTED</span>
      <span class="wallet-addr" id="walletAddr"></span>
    </div>
    <div class="wallet-actions" id="walletActions">
      <button class="wallet-btn connect-btn" id="walletConnectBtn">Connect Wallet</button>
    </div>
  </div>

  <div class="shell">
  <div class="interface">
    <!-- Header -->
    <header class="row">
      <div>
        <h1>Signature Decoder <span class="badge">V2</span></h1>
      </div>
      <div class="status-indicator">
        <span id="statusText" style="color:var(--dim)">SYSTEM READY</span>
        <div id="statusDot" class="dot"></div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <button id="installBtn">Initialize Snap</button>
      <button id="checkBtn">Verify Integrity</button>
    </div>

    <!-- Log Output -->
    <div class="log-container" id="log">
      <!-- Logs injected here -->
    </div>

    <!-- System Info Grid -->
    <div class="info-grid">
      <div class="info-item">
        <span class="col-header">TARGET ID</span>
        <div id="snapIdDisplay" style="word-break:break-all">...</div>
      </div>
      <div class="info-item">
        <span class="col-header">ENVIRONMENT</span>
        <div id="envDisplay">Detecting...</div>
      </div>
      <div class="info-item">
        <span class="col-header">CAPABILITIES</span>
        <div>Tx Analysis, Risk Scoring, EIP-712 Decoding</div>
      </div>
      <div class="info-item">
        <span class="col-header">REPOSITORY</span>
        <a href="https://github.com/qCanoe/Web3-Signature-Decoder" target="_blank">github.com/qCanoe/Web3-Signature-Decoder</a>
      </div>
    </div>
  </div>

  <!-- Signature Samples Panel -->
  <div class="samples">
    <div class="samples-header">
      <h2>Signature Samples</h2>
      <span class="badge">TEST</span>
    </div>
    <div class="samples-list">
      <button class="sample-row" data-sample="loginMessage">
        <span class="sample-label">Login Message</span>
        <span class="sample-meta">personal_sign</span>
        <span class="sample-expect allow">ALLOW</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="hexMessage">
        <span class="sample-label">Hex Message</span>
        <span class="sample-meta">personal_sign</span>
        <span class="sample-expect allow">ALLOW</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="permit2Unlimited">
        <span class="sample-label">Permit2 Unlimited</span>
        <span class="sample-meta">eth_signTypedData_v4</span>
        <span class="sample-expect block">BLOCK</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="seaportOrder">
        <span class="sample-label">Seaport Order</span>
        <span class="sample-meta">eth_signTypedData_v4</span>
        <span class="sample-expect block">BLOCK</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="daiPermit">
        <span class="sample-label">DAI Permit</span>
        <span class="sample-meta">eth_signTypedData_v4</span>
        <span class="sample-expect allow">ALLOW</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="ethTransfer">
        <span class="sample-label">ETH Transfer</span>
        <span class="sample-meta">eth_sendTransaction</span>
        <span class="sample-expect allow">ALLOW</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="multicallTx">
        <span class="sample-label">Multicall Tx</span>
        <span class="sample-meta">eth_sendTransaction</span>
        <span class="sample-expect block">BLOCK</span>
        <span class="sample-arrow">&gt;</span>
      </button>
      <button class="sample-row" data-sample="erc20Approve">
        <span class="sample-label">ERC-20 Approve</span>
        <span class="sample-meta">eth_sendTransaction</span>
        <span class="sample-expect block">BLOCK</span>
        <span class="sample-arrow">&gt;</span>
      </button>
    </div>
  </div>
</div>
</div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
