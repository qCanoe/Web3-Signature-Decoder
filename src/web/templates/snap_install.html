<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap Installer</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f9fb;
      color: #111827;
      margin: 0;
      padding: 40px 16px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }
    p {
      margin: 8px 0 16px 0;
      color: #4b5563;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary {
      background: #6b7280;
    }
    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snap Installer</h1>
    <p>Use this page to connect and install the local Snap.</p>

    <label for="snapId">Snap ID</label>
    <input id="snapId" type="text" value="local:http://localhost:8080">

    <div class="actions">
      <button id="connectButton">Connect / Install</button>
      <button id="checkButton" class="secondary">Check Installed</button>
    </div>

    <pre id="status">Status: ready</pre>
    <p class="hint">Tip: This page must be opened in a browser with MetaMask Flask installed.</p>
  </div>

  <script src="{{ url_for('static', filename='js/snap_install.js') }}"></script>
</body>
</html>
